# macOS-style keybindings - overrides for Omarchy
# These bindings simulate macOS Cmd key behavior

# Swap SUPER CTRL, C and SUPER CTRL, V (capture menu and clipboard manager)
unbind = SUPER CTRL, C
unbind = SUPER CTRL, V
bindd = SUPER CTRL, V, Capture menu, exec, omarchy-menu capture
bindd = SUPER CTRL, C, Clipboard manager, exec, omarchy-launch-walker -m clipboard

# Move scratchpad to SUPER SHIFT, S
unbind = SUPER, S
bindd = SUPER SHIFT, S, Toggle scratchpad, togglespecialworkspace, scratchpad

# Move pseudo window to SUPER CTRL, P
unbind = SUPER, P
unbind = SUPER SHIFT, P
bindd = SUPER CTRL, P, Pseudo window, pseudo
